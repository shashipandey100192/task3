        }

        .page section {
            width: 100%;
            height: auto;
            display: flex;
            margin-top: 50px;
        }

        .page img {

            width: 200px;
            border-radius: 50%;
            transition-duration: 200ms;
        }

        .page img:hover {
            transform: scale(1.2, 1.2);
            transition-duration: 200ms;
            filter: grayscale(100%);
            box-shadow: 0px 20px 20px black;
        }
        .mypath
        {
            clip-path: polygon(0px 0px,1200px 0px,1200px 200px, 0px 400px);
        }
    </style>
