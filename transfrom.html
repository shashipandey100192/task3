<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            margin:0 auto;
            padding:0;
        }
        .box
        {
            width:300px;
            height: 300px;
            background-color: orangered;
            color:white;
            text-align: center;
            font-size: 50px;
            margin-top:20px;
            /* transform: rotate(50deg); */
            /* transform: skew(-40deg); */
            /* transform:scale(1.5,1.5); */
            /* transform: translate(200px,300px); */
            animation:abc 2s infinite alternate ease-in-out;
        }


        /* @keyframes abc {
            from{}
            to{transform: rotate(360deg) scale(0.1,0.1);}
        } */

         @keyframes abc {
            0%{}
            60%{transform: rotate(360deg) scale(0.1,0.1);}
            100%{transform: rotate(360deg) scale(0.1,0.1);}
            
        }

    </style>
</head>
<body>

    <div class="box">
        use of transfrom
    </div>



    
</body>
</html>
