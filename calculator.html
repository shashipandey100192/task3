<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<form name="myform">
<table border="1" align="center">
    <tr>
       
        <td colspan="5"> <input type="text" name="mytext" placeholder="0.0"></td>
    </tr>
    <tr>
        <td> <input type="button" value="1" onclick="myform.mytext.value+='1'"></td>
        <td><input type="button" value="2" onclick="myform.mytext.value+='2'"></td>
        <td><input type="reset" value="c"></td>
        <td><input type="button" value="+" onclick="myform.mytext.value+='+'"></td>
        <td><input type="button" value="  =  " onclick="myform.mytext.value=eval(myform.mytext.value)"></td>
    </tr>
</table>
</form>




</body>
</html>
